; PHP-FPM pool tuning for the WAF test/bench stack.
;
; The stock php:*-fpm image ships pm.max_children=5, which caps request
; concurrency at 5 regardless of front-end (nginx, the bridge, anything).
; That hides WAF overhead in connection-queue latency and starves the
; bridge's FastCGI connection pool. 64 lets the disabled baseline stretch its
; legs and the enabled vs disabled delta is visible.
;
; The bridge preforks PROCESSES workers, each with its own FPM pool of
; (64 / PROCESSES) persistent connections — total stays <= max_children.
; This is orthogonal to the WAF: each worker still runs the extension, so
; per-request WAF cost is unchanged; only concurrency rises.
[www]
pm = dynamic
pm.max_children = 64
pm.start_servers = 16
pm.min_spare_servers = 4
pm.max_spare_servers = 16
