# Loader for the OWASP Core Rule Set. Included by waf.modsec_rules_file when
# the CRS scenario is active. CRS expects SecRuleEngine and request/response
# body access to be enabled here.
SecRuleEngine On
SecRequestBodyAccess On
SecResponseBodyAccess On

Include /etc/modsecurity/crs/crs-setup.conf
Include /etc/modsecurity/crs/rules/*.conf
