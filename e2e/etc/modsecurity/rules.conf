# ModSecurity Test Rules
# These rules are for testing the waf ModSecurity integration

# Enable the ModSecurity engine
SecRuleEngine On

# Allow request body inspection so phase 2 body rules (REQUEST_BODY, ARGS
# parsed from POST form bodies) are populated.
SecRequestBodyAccess On

# Allow response body inspection so phase 4 RESPONSE_BODY rules are evaluated.
SecResponseBodyAccess On

# Set default phase for rules
SecDefaultAction "phase:1,log,deny,status:403"

# Rule 1 Block requests with X Block Me header set to "true"
SecRule REQUEST_HEADERS:X-Block-Me "@streq true" \
    "id:1001,phase:1,deny,status:403,msg:'Blocked by X-Block-Me header'"

# Rule 2 Block requests with SQL injection patterns in query string
SecRule ARGS "@rx (?i:union.*select|select.*from|insert.*into|delete.*from|drop.*table|or\s+1\s*=\s*1)" \
    "id:1002,phase:2,deny,status:403,msg:'SQL injection attempt detected'"

# Rule 3 Block requests with suspicious User Agent
SecRule REQUEST_HEADERS:User-Agent "@rx (?i:sqlmap|nikto|nmap|masscan)" \
    "id:1003,phase:1,deny,status:403,msg:'Suspicious User-Agent detected'"

# Rule 4 Block requests with path traversal attempts. REQUEST_URI is URL
# decoded once by libmodsecurity (so %2e%2e%2f -> ../), but a DOUBLE encoded
# payload (%252e%252e%252f) only decodes to %2e%2e%2f, which has no literal
# ../. REQUEST_URI_RAW is the undecoded target, so the %252e form is matched
# there. Covers forward slash (252f) and backslash (255c) double encoding.
SecRule REQUEST_URI|REQUEST_URI_RAW "@rx (?i:\.\./|%252e%252e%252f|%252e%252e%255c)" \
    "id:1004,phase:1,deny,status:403,msg:'Path traversal attempt detected'"

# Rule 5 Block requests with XSS patterns
SecRule ARGS "@rx (?i:<script|javascript:|onerror\s*=|onload\s*=)" \
    "id:1005,phase:2,deny,status:403,msg:'XSS attempt detected'"

# Rule 6 Block requests to /admin path (for testing)
SecRule REQUEST_URI "@beginsWith /admin" \
    "id:1006,phase:1,deny,status:403,msg:'Admin access blocked'"

# Rule 7 Block POST requests with "blocked_content" in body
SecRule REQUEST_BODY "@contains blocked_content" \
    "id:1007,phase:2,deny,status:403,msg:'Blocked content in request body'"

# Rule 8 Block responses with "blocked_response_content" in body (phase 4 = response body)
SecRule RESPONSE_BODY "@contains blocked_response_content" \
    "id:1008,phase:4,deny,status:403,msg:'Blocked content in response body'"

# Rule 9 Block requests with a suspicious cookie value (tests cookie inspection)
SecRule REQUEST_COOKIES:suspicious_cookie "@streq malicious" \
    "id:1009,phase:1,deny,status:403,msg:'Suspicious cookie value detected'"

# Rule 10 Block PUT requests entirely (tests method based blocking)
SecRule REQUEST_METHOD "@streq PUT" \
    "id:1010,phase:1,deny,status:403,msg:'PUT method not allowed'"

# Rule 11 Block with a non default status code (404) to exercise
# waf.modsec_block_status / per rule status overrides
SecRule REQUEST_URI "@beginsWith /forbidden-custom" \
    "id:1011,phase:1,deny,status:404,msg:'Custom-status block'"

# Rule 12 Case insensitive SQLi via a lowercase pattern with (?i).
# The base rule (1002) already uses (?i ), this duplicates coverage for
# mixed case evasion attempts like "UnIoN SeLeCt".
SecRule ARGS "@rx (?i:union\s+select)" \
    "id:1012,phase:2,deny,status:403,msg:'Mixed-case UNION SELECT detected'"

# Rule 13 Block when a specific query parameter name is present (tests ARGS_NAMES)
SecRule ARGS_NAMES "@streq forbidden_param" \
    "id:1013,phase:2,deny,status:403,msg:'Forbidden parameter name used'"

# Rule 14 Chain rule block only when two conditions match simultaneously
# (specific header AND specific query arg). Tests rule chaining.
SecRule REQUEST_HEADERS:X-Chain-Trigger "@streq yes" \
    "id:1014,phase:1,deny,status:403,msg:'Chained rule triggered',chain"
    SecRule ARGS:chain_target "@streq activate"

# Rule 1015 Block remote code execution patterns in arguments
# (eval, exec, system, passthru, shell_exec, backticks, base64_decode wrappers)
SecRule ARGS "@rx (?i:\b(?:eval|exec|system|passthru|shell_exec|popen)\s*\(|`|\$_(?:GET|POST|REQUEST|COOKIE)\s*\[|base64_decode\s*\()" \
    "id:1015,phase:2,deny,status:403,msg:'Remote code execution pattern detected'"

# Rule 1016 Block local file inclusion via php // and file // stream wrappers
SecRule ARGS "@rx (?i:(?:php|file|data|zip|phar|expect|input)://)" \
    "id:1016,phase:2,deny,status:403,msg:'LFI via PHP stream wrapper detected'"

# Rule 1017 Block SSRF attempts targeting internal addresses in the url param
# (the classic server side fetch parameter). Scoped to ARGS:url rather than all
# ARGS because redirect/JSONP style params legitimately carry http://localhost
# (see 030 5, 043 8) and 1044 explicitly exempts localhost for redirect params.
SecRule ARGS:url "@rx (?i:^(?:https?|ftp)://(?:localhost|127\.0\.0\.1|0\.0\.0\.0|10\.|192\.168\.|169\.254\.169\.254|::1))" \
    "id:1017,phase:2,deny,status:403,msg:'SSRF attempt targeting internal host detected'"

# Rule 1018 Block server side template injection markers (SSTI) high signal
# template expression delimiters for Twig, Jinja, Freemarker, Smarty.
SecRule ARGS "@rx (?i:(?:\{\{|\{%|\$\{))" \
    "id:1018,phase:2,deny,status:403,msg:'Server-side template injection pattern detected'"

# Rule 1019 Block requests with an excessively long query string value
# (tests ARGS length based blocking >256 chars in a single arg)
SecRule ARGS "@rx ^.{257,}$" \
    "id:1019,phase:2,deny,status:403,msg:'Excessively long argument value'"

# Rule 1020 Block requests that request a sensitive status via the 'status'
# query parameter (tests ARGS inspection on a named parameter). Only blocks
# when the parameter is present and equals a disallowed value.
SecRule ARGS:status "@rx ^(5\d\d|418)$" \
    "id:1020,phase:2,deny,status:403,msg:'Disallowed response status requested'"

# Rule 1022 Block when the server returns HTTP 500 (tests RESPONSE_STATUS in
# phase 4 response headers phase). Catches application errors.
SecRule RESPONSE_STATUS "@eq 500" \
    "id:1022,phase:4,deny,status:403,msg:'Server error response blocked'"

# Rule 1023 Block XML external entity (XXE) indicators in the request body
# (DOCTYPE / ENTITY declarations).
SecRule REQUEST_BODY "@rx (?i:<!DOCTYPE[^>]*\]?>|<!ENTITY)" \
    "id:1023,phase:2,deny,status:403,msg:'XML external entity (XXE) pattern detected'"

# Rule 1024 Block common command injection operators in args ( | && || > $()
SecRule ARGS "@rx (?:;\s*(?:ls|cat|id|whoami|uname|pwd|wget|curl|nc|bash|sh)|\|\|\s*\w+|&&\s*\w+|\$\([^)]*\))" \
    "id:1024,phase:2,deny,status:403,msg:'Command injection pattern detected'"

# Rule 1025 Block User Agent containing curl/wget/python requests/robot scanners
SecRule REQUEST_HEADERS:User-Agent "@rx (?i:curl/|wget/|python-requests/|scrapy|httpx|nuclei|gobuster|ffuf)" \
    "id:1025,phase:1,deny,status:403,msg:'Automated tool User-Agent detected'"

# Rule 1026 Block Referer from known bad referrer patterns
SecRule REQUEST_HEADERS:Referer "@rx (?i:(?:buy|cheap|casino|viagra|porn|sex)\.)" \
    "id:1026,phase:1,deny,status:403,msg:'Spam Referer detected'"

# Rule 1027 Block requests with no User Agent header (bots often omit it)
SecRule &REQUEST_HEADERS:User-Agent "@eq 0" \
    "id:1027,phase:1,deny,status:403,msg:'Missing User-Agent header'"

# Rule 1028 Block Host header injection attempts (absolute URL in Host or \r\n)
SecRule REQUEST_HEADERS:Host "@rx (?:\r|\n|%0d|%0a|https?://)" \
    "id:1028,phase:1,deny,status:403,msg:'Host header injection attempt'"

# Rule 1029 Block SQL comment evasion ( and /* */) used to truncate queries
SecRule ARGS "@rx (?:--(?:\s|$)|/\*.*\*/)" \
    "id:1029,phase:2,deny,status:403,msg:'SQL comment evasion detected'"

# Rule 1030 Block SQL hex encoded payloads (0x...) used to bypass quoting
SecRule ARGS "@rx 0x[0-9a-fA-F]{8,}" \
    "id:1030,phase:2,deny,status:403,msg:'SQL hex-encoded payload detected'"

# Rule 1031 Block boolean based blind SQLi (AND 1=1, OR 1=2, etc.)
SecRule ARGS "@rx (?i:\b(?:AND|OR)\s+\d+\s*=\s*\d+)" \
    "id:1031,phase:2,deny,status:403,msg:'Boolean-based blind SQLi detected'"

# Rule 1032 Block SQL CASE/WHEN/THEN injection
SecRule ARGS "@rx (?i:\bCASE\s+WHEN\b)" \
    "id:1032,phase:2,deny,status:403,msg:'SQL CASE/WHEN injection detected'"

# Rule 1033 Block SLEEP/BENCHMARK time based SQLi
SecRule ARGS "@rx (?i:\b(?:SLEEP|BENCHMARK|PG_SLEEP)\s*\(|\bWAITFOR\s+DELAY\b)" \
    "id:1033,phase:2,deny,status:403,msg:'Time-based SQLi detected'"

# Rule 1034 Block XSS event handlers (onclick, onmouseover, onfocus, etc.)
SecRule ARGS "@rx (?i:on(?:click|mouseover|mouseout|focus|blur|submit|change|keyup|keydown|load|error)\s*=)" \
    "id:1034,phase:2,deny,status:403,msg:'XSS event handler detected'"

# Rule 1035 Block XSS data URI with HTML/XML
SecRule ARGS "@rx (?i:data:text/html|data:application/)" \
    "id:1035,phase:2,deny,status:403,msg:'XSS data URI detected'"

# Rule 1036 Block XSS SVG with script
SecRule ARGS "@rx (?i:<svg[^>]*>.*<script)" \
    "id:1036,phase:2,deny,status:403,msg:'XSS SVG script injection detected'"

# Rule 1037 Block path traversal via encoded backslash variants.
# libmodsecurity URL decodes REQUEST_URI (so %5c becomes a literal backslash)
# and includes the query string, while REQUEST_URI_RAW keeps the raw %5c. A
# literal backslash in PCRE needs exactly two backslashes in the file because
# libmodsecurity does NOT C unescape quoted patterns (only \" is special), so
# the bytes are passed verbatim to PCRE. Earlier "\\\\" matched TWO backslashes
# and never fired on a single decoded backslash.
SecRule REQUEST_URI|REQUEST_URI_RAW "@rx (?:\.\.(?:\\|%5[cC])|\.(?:\\|%5[cC])|%5[cC])" \
    "id:1037,phase:1,deny,status:403,msg:'Path traversal (backslash variant) detected'"

# Rule 1038 Block access to sensitive files via URI
SecRule REQUEST_URI "@rx (?i:(?:^|/)(?:\.htaccess|\.htpasswd|\.env|\.git|\.svn|wp-config\.php|config\.php|id_rsa|\.aws/credentials))" \
    "id:1038,phase:1,deny,status:403,msg:'Sensitive file access attempt'"

# Rule 1039 Block requests trying to read /etc/passwd / /etc/shadow
SecRule ARGS "@rx (?i:/etc/(?:passwd|shadow|hosts|group))" \
    "id:1039,phase:2,deny,status:403,msg:'Sensitive system file access in args'"

# Rule 1040 Block PHP code execution functions in args
SecRule ARGS "@rx (?i:\b(?:preg_replace|create_function|call_user_func|assert|file_put_contents|fopen|fwrite|move_uploaded_file|include|require)(_once)?\s*\()" \
    "id:1040,phase:2,deny,status:403,msg:'PHP dangerous function in args'"

# Rule 1041 Block serialized PHP objects in args (deserialization attacks)
SecRule ARGS "@rx ^O:\d+:" \
    "id:1041,phase:2,deny,status:403,msg:'PHP serialized object detected'"

# Rule 1042 Block LDAP injection markers
SecRule ARGS "@rx (?i:\*\)|\)\(\|[^\)]*\(|\(\|\(|uid=\*)" \
    "id:1042,phase:2,deny,status:403,msg:'LDAP injection pattern detected'"

# Rule 1043 Block NoSQL injection ($where, $ne, $gt in args)
SecRule ARGS "@rx (?i:\$(?:where|ne|gt|lt|gte|lte|or|and|not)\s*[:(])" \
    "id:1043,phase:2,deny,status:403,msg:'NoSQL injection pattern detected'"

# Rule 1044 Block open redirect via next/redirect/return_to/goto/continue args.
# `url` is intentionally NOT in this list: it is a generic fetch parameter that
# legitimately carries external URLs (SSRF allow tests 016 5, 037 10), and SSRF
# to internal hosts via url= is covered by rule 1017. ARGS multi name selection
# cannot use ARGS (a|b|c) or ARGS /^(a|b)$/ since "|" is the variable separator
# pipe and aborts the ruleset load. List each target explicitly joined by "|".
SecRule ARGS:next|ARGS:redirect|ARGS:return_to|ARGS:goto|ARGS:continue "@rx ^https?://(?!localhost|127\.0\.0\.1)" \
    "id:1044,phase:2,deny,status:403,msg:'Open redirect attempt'"

# Rule 1045 Block requests with too many arguments (potential abuse)
SecRule &ARGS "@gt 50" \
    "id:1045,phase:2,deny,status:403,msg:'Excessive number of arguments'"

# Rule 1046 Block requests where the request body exceeds a JSON nesting depth
# heuristic (many nested { or [ tests body inspection on malformed JSON).
# Each iteration consumes one opener with optional non bracket content between,
# so 10 iterations need 10 openers in a row without an intervening close brace,
# i.e. genuinely deep nesting (the old (\{[^{}]*\{){10,} consumed TWO openers
# per iteration and could not match consecutive or key separated braces).
SecRule REQUEST_BODY "@rx (?:[^{}\[\]]*[\{\[]){10,}" \
    "id:1046,phase:2,deny,status:403,msg:'Excessively nested JSON detected'"

# Rule 1047 Block requests with CRLF injection in any arg (\r\n or %0d%0a)
SecRule ARGS "@rx (?:\r\n|%0d%0a|%0a|%0d|\n|\r)" \
    "id:1047,phase:2,deny,status:403,msg:'CRLF injection detected'"

# Rule 1048 Block X Forwarded For / X Real IP spoofing of internal addresses
SecRule REQUEST_HEADERS:X-Forwarded-For "@rx ^127\.0\.0\.1$" \
    "id:1048,phase:1,deny,status:403,msg:'XFF spoofing attempt'"

# Rule 1049 Block requests to common proxy/poller endpoints
SecRule REQUEST_URI "@rx (?i:/(?:phpinfo|phpmyadmin|wp-admin|wp-login|\.git/config|/vendor/phpunit|/console))" \
    "id:1049,phase:1,deny,status:403,msg:'Scanner/probe endpoint access'"

# Rule 1050 Block response bodies leaking stack traces
SecRule RESPONSE_BODY "@rx (?i:Traceback \(most recent call last\)|at\s+[a-zA-Z_$][a-zA-Z0-9_$]*\([a-zA-Z0-9_./]+:\d+\)|Exception in thread)" \
    "id:1050,phase:4,deny,status:403,msg:'Stack trace leak in response'"

# Rule 1051 Block response bodies containing SQL error leakage
SecRule RESPONSE_BODY "@rx (?i:(?:SQL|MySQL|PostgreSQL|SQLite|ORA-\d{5})\s*(?:syntax|error|warning|exception))" \
    "id:1051,phase:4,deny,status:403,msg:'SQL error leak in response'"

# Rule 1052 Block multipart boundary tampering indicators in body
SecRule REQUEST_BODY "@rx (?i:Content-Disposition:\s*form-data;\s*name=\x22[^\x22]*\x22;\s*filename=\x22\.\./)" \
    "id:1052,phase:2,deny,status:403,msg:'Multipart path traversal in upload filename'"

# Rule 1053 Block Content Type header smuggling
SecRule REQUEST_HEADERS:Content-Type "@rx (?i:multipart/form-data.*boundary=[^;]+\s*;\s*charset)" \
    "id:1053,phase:1,deny,status:403,msg:'Content-Type smuggling attempt'"

# Rule 1054 Block requests with Accept header containing injection markers.
# Note deliberately does NOT match bare /* since that appears in legitimate
# Accept media ranges like "text/*".
SecRule REQUEST_HEADERS:Accept "@rx (?:<script|\.\./)" \
    "id:1054,phase:1,deny,status:403,msg:'Accept header injection'"

# Rule 1055 Block HTTP TRACE method
SecRule REQUEST_METHOD "@streq TRACE" \
    "id:1055,phase:1,deny,status:403,msg:'TRACE method not allowed'"

# Rule 1056 Block DELETE method
SecRule REQUEST_METHOD "@streq DELETE" \
    "id:1056,phase:1,deny,status:403,msg:'DELETE method not allowed'"

# Rule 1057 Block CONNECT method (proxy tunneling)
SecRule REQUEST_METHOD "@streq CONNECT" \
    "id:1057,phase:1,deny,status:403,msg:'CONNECT method not allowed'"

# Rule 1058 Block requests with a Referer that is not a valid URL when present
SecRule REQUEST_HEADERS:Referer "@rx ^[^:]+$" \
    "id:1058,phase:1,deny,status:403,msg:'Malformed Referer header'"

# Rule 1059 Block Authorization header with Basic creds containing shell metachars
SecRule REQUEST_HEADERS:Authorization "@rx (?:;|`|\$\(|\|)" \
    "id:1059,phase:1,deny,status:403,msg:'Authorization header injection'"

# Rule 1060 Block SQL injection via stacked queries (semicolon + SELECT/INSERT/etc.)
SecRule ARGS "@rx (?i:;\s*(?:select|insert|update|delete|drop|alter|create)\s+)" \
    "id:1060,phase:2,deny,status:403,msg:'SQL stacked query detected'"

# Rule 1061 Block SQL UNION with comments evasion (UNION/**/SELECT)
SecRule ARGS "@rx (?i:union\s*/\*\s*/\s*select)" \
    "id:1061,phase:2,deny,status:403,msg:'SQL UNION comment evasion detected'"

# Rule 1062 Block SQL LIKE injection with wildcards used to dump tables
SecRule ARGS "@rx (?i:'\s*like\s*'%)" \
    "id:1062,phase:2,deny,status:403,msg:'SQL LIKE wildcard injection'"

# Rule 1063 Block XPath injection
SecRule ARGS "@rx (?i:(?:or|and)\s+['\"]?\w+['\"]?\s*=\s*['\"]?\w+['\"]?\s*(?:--|#)|/\*\s*|\]\s*\[)" \
    "id:1063,phase:2,deny,status:403,msg:'XPath injection detected'"

# Rule 1064 Block log injection (newline + fake log entry in args)
SecRule ARGS "@rx (?i:(?:%0a|%0d|\n|\r)\s*(?:GET|POST|HTTP/|User-Agent:))" \
    "id:1064,phase:2,deny,status:403,msg:'Log injection attempt'"

# Rule 1065 Block HTTP response splitting via args containing %0d%0a + Location
SecRule ARGS "@rx (?i:(?:%0d%0a|\\r\\n)\s*(?:Location|Set-Cookie)\s*:)" \
    "id:1065,phase:2,deny,status:403,msg:'HTTP response splitting'"

# Rule 1066 Block Server Side Request Forgery via gopher // and dict //
SecRule ARGS "@rx (?i:^(?:gopher|dict|tftp|ldap|sftp|ssh|smb)://)" \
    "id:1066,phase:2,deny,status:403,msg:'SSRF via dangerous protocol'"

# Rule 1067 Block SSRF targeting IPv6 loopback
SecRule ARGS "@rx (?i:^(?:https?|ftp)://\[[:0]*1\])" \
    "id:1067,phase:2,deny,status:403,msg:'SSRF to IPv6 loopback'"

# Rule 1068 Block PHP wrappers in request URI (php //filter etc.)
SecRule REQUEST_URI "@rx (?i:(?:php|data|phar|zip)://)" \
    "id:1068,phase:1,deny,status:403,msg:'PHP wrapper in URI'"

# Rule 1069 Block X Forwarded Host header injection
SecRule REQUEST_HEADERS:X-Forwarded-Host "@rx (?:\r|\n|%0d|%0a)" \
    "id:1069,phase:1,deny,status:403,msg:'X-Forwarded-Host injection'"

# Rule 1070 Block Origin header with non http(s) scheme
SecRule REQUEST_HEADERS:Origin "@rx (?i:^(?!https?://)[a-z]+://)" \
    "id:1070,phase:1,deny,status:403,msg:'Suspicious Origin scheme'"

# Rule 1071 Block Content Length tampering (negative or non numeric).
# Chained to fire only when Content Length is present, non empty, and not a
# positive integer. An empty value would trip the negated operator, so the
# second rule requires a non whitespace character.
SecRule REQUEST_HEADERS:Content-Length "!@rx ^\d+$" \
    "id:1071,phase:1,deny,status:403,msg:'Invalid Content-Length header',chain"
    SecRule REQUEST_HEADERS:Content-Length "@rx ^\S+$"

# Rule 1072 Block Accept Charset header injection
SecRule REQUEST_HEADERS:Accept-Charset "@rx (?:<script|\.\./|;)" \
    "id:1072,phase:1,deny,status:403,msg:'Accept-Charset injection'"

# Rule 1073 Block Expect 100 continue header abuse
SecRule REQUEST_HEADERS:Expect "@streq 100-continue" \
    "id:1073,phase:1,deny,status:403,msg:'Expect header abuse'"

# Rule 1074 Block Range header with excessive ranges (DoS via range bombs)
SecRule REQUEST_HEADERS:Range "@rx (?:bytes=[^,]+(?:,[^,]+){5,})" \
    "id:1074,phase:1,deny,status:403,msg:'Excessive Range header'"

# Rule 1075 (removed) Duplicate Content Type detection.
# The extension rebuilds REQUEST_HEADERS from $_SERVER, which collapses
# duplicate headers to one scalar, so a count based rule can never fire.
# Kept as a comment to prevent re adding an unenforceable rule.

# Rule 1076 Block Cookie header exceeding a sane size (>4KB)
SecRule REQUEST_HEADERS:Cookie "@rx ^.{4097,}$" \
    "id:1076,phase:1,deny,status:403,msg:'Oversized Cookie header'"

# Rule 1077 Block requests where QUERY_STRING exceeds 2000 chars
SecRule QUERY_STRING "@rx ^.{2001,}$" \
    "id:1077,phase:1,deny,status:403,msg:'Excessively long query string'"

# Rule 1078 Block requests with an excessively long URI
SecRule REQUEST_URI "@rx ^.{2049,}$" \
    "id:1078,phase:1,deny,status:403,msg:'Excessively long request URI'"

# Rule 1079 Block multipart Content Type without a boundary parameter. Chained:
# the first rule matches a multipart/form-data Content Type, the second requires
# that boundary= is ABSENT. @streq was used before but did not fire reliably for
# an exact value, whereas @rx on the same header works (rule 1053), so both
# legs use @rx. 032 4/10 (multipart WITH boundary) pass the first leg but fail
# the second, so they are not blocked here.
SecRule REQUEST_HEADERS:Content-Type "@rx (?i)^multipart/form-data" \
    "id:1079,phase:1,deny,status:403,msg:'Multipart without boundary',chain"
    SecRule REQUEST_HEADERS:Content-Type "!@rx (?i)boundary="

# Rule 1080 Block response bodies containing PHP fatal error leakage
SecRule RESPONSE_BODY "@rx (?i:(?:Fatal error|Parse error|Warning|Notice):\s.*(?:in\s+\/[^\s]+\.php\s+on\s+line\s+\d+|Stack trace:))" \
    "id:1080,phase:4,deny,status:403,msg:'PHP error leak in response'"

# Rule 1081 Block response bodies containing path disclosure (absolute paths).
# JSON encodes "/" as "\/" (e.g. {"path":"\/var\/www\/..."}), so each path
# separator may be a lone "/" or an escaped "\/". Match both by allowing an
# optional backslash before each "/". libmodsecurity passes backslashes
# verbatim to PCRE (no C unescaping), so "\\\\" in the file == one literal "\".
SecRule RESPONSE_BODY "@rx (?i:\\?/var\\?/www\\?/|\\?/home\\?/\w+\\?/public_html|C:\\\\xampp|\\?/usr\\?/share\\?/php)" \
    "id:1081,phase:4,deny,status:403,msg:'Server path disclosure in response'"

# Rule 1082 Block response bodies containing environment secret names
SecRule RESPONSE_BODY "@rx (?i:(?:AWS_SECRET_ACCESS_KEY|DATABASE_URL|API_KEY|PRIVATE_KEY)\s*[=:])" \
    "id:1082,phase:4,deny,status:403,msg:'Secret leakage in response'"

# Rule 1083 Block response bodies containing credit card numbers (PAN)
SecRule RESPONSE_BODY "@rx (?:\b\d{4}[- ]?\d{4}[- ]?\d{4}[- ]?\d{4}\b)" \
    "id:1083,phase:4,deny,status:403,msg:'Credit card number leak in response'"

# Rule 1084 Block GraphQL introspection queries in body
SecRule REQUEST_BODY "@rx (?i:__schema|__type\s*\()" \
    "id:1084,phase:2,deny,status:403,msg:'GraphQL introspection query'"

# Rule 1085 Block GraphQL mutation field duplication / batching abuse
SecRule REQUEST_BODY "@rx (?i:(?:mutation|query)\s+\w+\s*\{[^}]*\}\s*(?:mutation|query)\s+\w+\s*\{)" \
    "id:1085,phase:2,deny,status:403,msg:'GraphQL batched mutation abuse'"

# Rule 1086 Block REST mass assignment via nested id/role in JSON body
SecRule REQUEST_BODY "@rx (?i:\x22\s*(?:role|is_admin|admin)\s*\x22\s*:\s*(?:true|1))" \
    "id:1086,phase:2,deny,status:403,msg:'Mass assignment of privileged field'"

# Rule 1087 Block JWT using the 'none' algorithm (signature bypass). A 'none'
# alg token has an empty third segment header.payload. (note trailing dot).
SecRule REQUEST_HEADERS:Authorization "@rx (?i:Bearer\s+eyJ[A-Za-z0-9_-]*\.eyJ[A-Za-z0-9_-]*\.\s*$)" \
    "id:1087,phase:1,deny,status:403,msg:'JWT none-algorithm bypass attempt'"

# Rule 1088 Block prototype pollution attempts in JSON body (__proto__)
SecRule REQUEST_BODY "@rx \x22__proto__\x22\s*:" \
    "id:1088,phase:2,deny,status:403,msg:'Prototype pollution attempt'"

# Rule 1089 Block constructor pollution in JSON body
SecRule REQUEST_BODY "@rx (?i:\x22constructor\x22\s*:\s*\{)" \
    "id:1089,phase:2,deny,status:403,msg:'Constructor pollution attempt'"

# Rule 1090 Block YAML deserialization gadgets in body (!!python/object)
SecRule REQUEST_BODY "@rx (?i:!!(?:python|ruby|java|yaml)/object)" \
    "id:1090,phase:2,deny,status:403,msg:'YAML deserialization gadget'"

# Rule 1091 Block pickle/eval serialization markers
SecRule REQUEST_BODY "@rx (?i:cos\nsystem|pickle\.loads|marshal\.loads)" \
    "id:1091,phase:2,deny,status:403,msg:'Python deserialization gadget'"

# Rule 1092 Block Java serialized objects (rO0AB base64 magic)
SecRule REQUEST_BODY "@rx rO0AB" \
    "id:1092,phase:2,deny,status:403,msg:'Java serialized object detected'"

# Rule 1093 Block .NET serialized ViewState markers
SecRule REQUEST_BODY "@rx (?i:/wEP|/wEy|__VIEWSTATE)" \
    "id:1093,phase:2,deny,status:403,msg:'.NET ViewState marker detected'"

# Rule 1094 Block Expression Language (EL) injection
SecRule ARGS "@rx (?i:\$\{[a-zA-Z])" \
    "id:1094,phase:2,deny,status:403,msg:'EL injection attempt'"

# Rule 1095 Block OGNL injection (Java)
SecRule ARGS "@rx (?i:%\{|#\{|@java)" \
    "id:1095,phase:2,deny,status:403,msg:'OGNL injection attempt'"

# Rule 1096 Block SpEL / Spring expression injection
SecRule ARGS "@rx (?i:T\(java\.|T\(org\.|new\s+java\.)" \
    "id:1096,phase:2,deny,status:403,msg:'SpEL injection attempt'"

# Rule 1097 Block SSTI with Freemarker <#assign> and #stop
SecRule ARGS "@rx (?i:<#assign|#stop|<#import)" \
    "id:1097,phase:2,deny,status:403,msg:'Freemarker SSTI detected'"

# Rule 1098 Block ASP tag injection in args
SecRule ARGS "@rx (?i:<%\s*=?|<%.*%>|runat=\x22server)" \
    "id:1098,phase:2,deny,status:403,msg:'ASP tag injection detected'"

# Rule 1099 Block PHP short open tag injection in args
SecRule ARGS "@rx <\?=" \
    "id:1099,phase:2,deny,status:403,msg:'PHP short echo tag injection'"

# Rule 1100 Block PHP open tag in args (<?php)
SecRule ARGS "@rx <\?php" \
    "id:1100,phase:2,deny,status:403,msg:'PHP open tag injection'"

# ============================================================================
# Rules ported from OWASP CRS 4.27.0 to fill gaps vs the Core Rule Set
# (RFI 931, Session Fixation 943, Protocol Enforcement 920). Self contained
# SecLang rules (no CRS TX /macro plumbing) loading on libmodsecurity 3.0.9+.
# ============================================================================

# Rule 1101 (CRS 931110) RFI an include like parameter with a remote URL
# payload. Chained so name and value must match.
SecRule ARGS_NAMES "@rx (?i)^(?:file|page|include|inc|require|path|src|doc|document|template|lang|load)$" \
    "id:1101,phase:2,deny,status:403,msg:'Remote File Inclusion (RFI): URL payload in include parameter',chain"
    SecRule ARGS "@rx (?i)^(?:https?|ftp)://(?!localhost|127\.0\.0\.1)"

# Rule 1102 (CRS 943110/120) Session Fixation a session id parameter name in
# the query string. Block when present.
SecRule ARGS_NAMES "@rx (?i)^(?:phpsessid|jsessionid|sessionid|sid)$" \
    "id:1102,phase:2,deny,status:403,msg:'Session Fixation attack: session ID parameter in request'"

# Rule 1103 (CRS 920350) Host header is a bare numeric IP (scanner/proxy abuse).
# IPv4 only.
SecRule REQUEST_HEADERS:Host "@rx ^\d{1,3}(\.\d{1,3}){3}$" \
    "id:1103,phase:1,deny,status:403,msg:'Host header is a numeric IP address'"

# Rule 1104 (CRS 920310) Empty Accept header (anomalous for exploit tooling).
# Chained so the header must be present and empty.
SecRule REQUEST_HEADERS:Accept "@rx ^$" \
    "id:1104,phase:1,deny,status:403,msg:'Empty Accept header',chain"
    SecRule REQUEST_HEADERS:Accept "@rx .*"

# Rule 1105 (CRS 920181) Request Smuggling Content Length and Transfer Encoding
# both present. Chained so both carry a value.
SecRule REQUEST_HEADERS:Transfer-Encoding "@rx .+" \
    "id:1105,phase:1,deny,status:403,msg:'HTTP Request Smuggling: Content-Length and Transfer-Encoding both present',chain"
    SecRule REQUEST_HEADERS:Content-Length "@rx .+"

# Rule 1106 (CRS 920170) GET or HEAD with a body. Chained so a real Content
# Length must be present (the extension forwards it only when non empty, so
# bodyless GETs are unaffected).
SecRule REQUEST_METHOD "@rx ^(?:GET|HEAD)$" \
    "id:1106,phase:1,deny,status:403,msg:'GET or HEAD request with body content',chain"
    SecRule REQUEST_HEADERS:Content-Length "!@rx ^0$"

# Rule 1107 (CRS 920270) Invalid character in request — a null byte in the
# URI. Sent over HTTP as the encoded form %00 (REQUEST_URI is the raw,
# undecoded request target, so the literal 0x00 is matched as %00).
SecRule REQUEST_URI "@rx (?:\x00|%00)" \
    "id:1107,phase:1,deny,status:403,msg:'Null character in request URI'"

# Rule 1108 (CRS 920500) Attempt to access a backup or working file — URIs
# ending in editor backup extensions (.bak, .old, .orig, .swp, .save) or a
# trailing tilde, commonly left by editors and probed by scanners.
SecRule REQUEST_URI "@rx (?i)\.(?:bak|old|orig|swp|save|tmp)(?:$|[/?])|~$" \
    "id:1108,phase:1,deny,status:403,msg:'Attempt to access a backup or working file'"

# Rule 1109 (CRS 920430) Disallow HTTP/0.9 and HTTP/1.0 (only 1.1+).
# libmodsecurity sets REQUEST_PROTOCOL to "HTTP/<version>" from the version
# passed to msc_process_uri, which the extension derives from SERVER_PROTOCOL.
SecRule REQUEST_PROTOCOL "@rx ^HTTP/(?:0\.9|1\.0)$" \
    "id:1109,phase:1,deny,status:403,msg:'HTTP protocol version is not allowed by policy'"

# ============================================================================
# More CRS 4.27.0 ports web shells (955), data leakages (950), Node.js (934),
# multipart abuse (922).
# ============================================================================

# Rule 1110 (CRS 955) Web shell banners in the response body. A high signal
# subset of CRS web shells php.data (title/banner markers). Phase 4.
SecRule RESPONSE_BODY "@rx (?i)<title>[^<]*(?:1n73ct10n|c99|r57|wso|b4tm4n|casus|ngh|indoxploit|gecko|laduanum|alfa team|andela|ani-shell|bloodsecurity|crystal shell|cuplis|dive shell|g-security|idbteam|lifka) shell" \
    "id:1110,phase:4,deny,status:403,msg:'Web shell detected in response body'"

# Rule 1111 (CRS 955) Generic web shell command execution UI markers.
SecRule RESPONSE_BODY "@rx (?i:Ajax/PHP Command Shell|Execute \[|C99 Shell|Unknown shell)" \
    "id:1111,phase:4,deny,status:403,msg:'Web shell command interface detected in response body'"

# Rule 1112 (CRS 950130) Directory listing in the response body (auto index
# page). Leaks the full file layout of a path.
SecRule RESPONSE_BODY "@rx (?i:<title>Index of|<h1>Index of|>\[To Parent Directory\]</a>)" \
    "id:1112,phase:4,deny,status:403,msg:'Directory listing exposed in response'"

# Rule 1113 (CRS 950100) Source code leakage a PHP/ASP tag served as literal
# text (misconfigured handler not executing the script).
SecRule RESPONSE_BODY "@rx (?i:<\?php|<\?=|<%.*%>)" \
    "id:1113,phase:4,deny,status:403,msg:'Source code leakage in response body'"

# Rule 1114 (CRS 934) Node.js code injection in arguments. Complements 1015.
SecRule ARGS "@rx (?i:\b(?:require|child_process)\s*\(|process\.env|global\.process|module\.exports)" \
    "id:1114,phase:2,deny,status:403,msg:'Node.js injection attempt'"

# Rule 1115 (CRS 922) Content Transfer Encoding present (deprecated by RFC
# 7578 for multipart, abused to smuggle payloads). Block whenever present.
SecRule REQUEST_HEADERS:Content-Transfer-Encoding "@rx .+" \
    "id:1115,phase:1,deny,status:403,msg:'Deprecated Content-Transfer-Encoding header present'"

# Rule 1116 was removed. It matched a raw CR/LF byte inside a request header
# value, which no real HTTP front-end (HAProxy, nginx, ...) ever forwards:
# RFC 9112 defines CRLF as the header delimiter, so a mid-header line break is
# normalized to LWS before the request reaches the WAF. The rule therefore
# defended against an impossible condition behind any standard server and was
# untestable. Rule 1028 (Host with %0d/%0a or https?://) still covers the
# header-injection vector via its percent-encoded alternates.
