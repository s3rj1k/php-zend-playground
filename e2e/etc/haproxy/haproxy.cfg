# HAProxy front-end for the WAF test/bench stack.
#
# WHY HAProxy (replacing the custom Go bridge): the Go bridge existed because a
# real web server's strict HTTP parsing masked WAF behavior. HAProxy is the most
# lenient standard server: accept-unsafe-violations-in-http-request lets invalid
# header chars through (don't 400 — forward them so the WAF is the verifier),
# h1-accept-payload-with-any-method allows GET-with-body, and critically HAProxy
# forwards BOTH Content-Length and Transfer-Encoding to the backend (a known
# property exploited by CVE-2021-40346) so rule 1105 (CL+TE smuggling) is
# testable. HAProxy also gives backend FastCGI connection reuse for free (the
# per-request dial that limited the Go bridge is gone).
#
# THE ONE THING HAProxy CANNOT DO (no HTTP server can): forward a raw CR/LF
# byte inside a header value. RFC 9112 defines CRLF as the header delimiter;
# HAProxy normalizes mid-header line breaks to LWS (manual §1.3.2) before
# forwarding, so the raw byte never reaches the WAF. Rules 1028 (CR in Host)
# and 1047 (CRLF in ARGS) are covered via their percent-encoded alternates
# (%0d/%0a), which the WAF regex matches literally and which FTW sends verbatim.
# Rule 1116 (raw CR/LF in any header) was removed as it defends against an
# impossible condition behind any real server.
#
# NO FRONT-CONTROLLER REWRITE: the WAF extension inspects the request in RINIT
# (PHP_RINIT_FUNCTION), which FPM runs BEFORE php_fopen_primary_script. So a
# request for a non-existent script (/admin, /.env, /wp-config.php, ...) is
# still inspected by the WAF even though FPM will later 404 it — REQUEST_URI
# stays the attacker's original target (HAProxy derives REQUEST_URI from the
# untouched request line). This is why no set-path / set-uri rewrite is needed
# here (an earlier revision tried set-path and a :fcgi-script_name pseudo-header
# override; both clobber REQUEST_URI or are silently dropped by the mux, and
# neither is necessary once inspection happens in RINIT).
#
# pass-header Authorization: HAProxy's fcgi-app OMITS the Authorization header
# by default (manual §10.1.1). Without this, REQUEST_HEADERS:Authorization
# rules (033 auth injection, 044 JWT none-alg) never see the header and
# silently pass. pass-header forwards it as HTTP_AUTHORIZATION to php-fpm.

global
    log stdout format raw local0
    maxconn 4096
    # Allow GET/HEAD/DELETE to carry a body (rule 1106 expects GET-with-body
    # to reach the WAF). This is a GLOBAL option (not a frontend option).
    h1-accept-payload-with-any-method

defaults
    log     global
    mode    http
    option  httplog
    option  dontlognull
    timeout connect 5s
    timeout client  60s
    timeout server  60s

frontend http-in
    bind :80
    # Lenient parsing so the WAF (php-fpm) is the verifier, not HAProxy's
    # parser. accept-unsafe-violations-in-http-request: don't 400 on forbidden
    # header chars (forward them). (Renamed from the deprecated
    # accept-invalid-http-request in HAProxy 3.x.)
    option accept-unsafe-violations-in-http-request
    default_backend php-fpm

backend php-fpm
    use-fcgi-app php-fpm
    # php-fpm honours FCGI_KEEP_CONN; HAProxy reuses this connection across
    # requests (the free backend keepalive the Go bridge lacked). The server
    # line is checked so a dead FPM is detected, not 502'd blindly.
    server fpm1 php-fpm:9000 proto fcgi check

fcgi-app php-fpm
    log-stderr global
    docroot /var/www/html
    index   index.php
    # Forward Authorization (omitted by the fcgi-app by default) so the WAF's
    # REQUEST_HEADERS:Authorization rules can inspect it.
    pass-header Authorization
    # Split PATH_INFO from the script name for .php files (cgi.fix_pathinfo).
    path-info ^(/.+\.php)(/.*)?$
