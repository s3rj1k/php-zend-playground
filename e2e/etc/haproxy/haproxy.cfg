# HAProxy front-end for the WAF test/bench stack.
#
# WHY HAProxy (replacing the custom Go bridge): the Go bridge existed because a
# real web server's strict HTTP parsing masked WAF behavior (rejected TRACE,
# URL-decoded %00, stripped conflicting CL/TE, normalized CR/LF in headers).
# HAProxy is the most lenient standard server: `accept-invalid-http-request`
# lets invalid header chars through, `h1-accept-payload-with-any-method` allows
# GET-with-body, and critically HAProxy forwards BOTH Content-Length and
# Transfer-Encoding to the backend (a known property exploited by
# CVE-2021-40346) so rule 1105 (CL+TE smuggling) is testable. HAProxy also
# gives backend FastCGI connection reuse for free (the per-request dial that
# limited the Go bridge is gone).
#
# THE ONE THING HAProxy CANNOT DO (no HTTP server can): forward a raw CR/LF
# byte inside a header value. RFC 9112 defines CRLF as the header delimiter;
# HAProxy normalizes mid-header line breaks to LWS (see HAProxy manual §1.3.2)
# before forwarding, so the raw byte never reaches the WAF. Rules 1028 (CR in
# Host) and 1116 (raw CR/LF in any header) are therefore covered via their
# percent-encoded alternates (%0d/%0a), which the WAF's regex matches literally
# and which FTW sends verbatim. Rule 1116 (which matched only raw bytes) was
# removed as it defends against an impossible condition behind any real server.
#
# Front-controller fallback: HAProxy cannot stat the filesystem, so a request
# for a non-.php path (e.g. /admin, /.env) is routed to index.php by overriding
# SCRIPT_FILENAME/SCRIPT_NAME. REQUEST_URI stays the original raw target
# (HAProxy derives it from the request line, not from SCRIPT_NAME), so the WAF
# path/args rules (1006/1038/...) inspect the attacker's original URL.

global
    log stdout format raw local0
    # Drop privileges (the official image already runs as haproxy via USER).
    maxconn 4096

defaults
    log     global
    mode    http
    option  httplog
    option  dontlognull
    timeout connect 5s
    timeout client  60s
    timeout server  60s

frontend http-in
    bind :80
    # Lenient parsing so the WAF (php-fpm) is the verifier, not HAProxy's
    # parser. accept-invalid-http-request: don't 400 on forbidden header chars
    # (forward them). h1-accept-payload-with-any-method: allow GET/HEAD/DELETE
    # to carry a body (rule 1106 expects GET-with-body to reach the WAF).
    option accept-invalid-http-request
    option h1-accept-payload-with-any-method
    default_backend php-fpm

backend php-fpm
    use-fcgi-app php-fpm
    # php-fpm honours FCGI_KEEP_CONN; HAProxy reuses this connection across
    # requests (the free backend keepalive the Go bridge lacked). The server
    # line is checked so a dead FPM is detected, not 502'd blindly.
    server fpm1 php-fpm:9000 proto fcgi check

    # php-fpm's cgi.force_redirect security model requires REDIRECT_STATUS.
    # (The Go bridge set this explicitly; HAProxy does not auto-set it.)
    http-request set-fcgi-param REDIRECT_STATUS 200

    # Front-controller: a path that does not name a .php file routes to
    # index.php so PHP userland (and the WAF execute_ex hook) always runs.
    # Only SCRIPT_FILENAME / SCRIPT_NAME are overridden; REQUEST_URI keeps the
    # original raw target (HAProxy derives it from the request line, not from
    # SCRIPT_NAME). A non-.php path that names a real non-PHP file also falls
    # through here, which is fine — the WAF inspects REQUEST_URI regardless.
    http-request set-fcgi-param SCRIPT_FILENAME /var/www/html/index.php unless { path -m end .php }
    http-request set-fcgi-param SCRIPT_NAME     /index.php             unless { path -m end .php }

fcgi-app php-fpm
    log-stderr global
    docroot /var/www/html
    index   index.php
    # Split PATH_INFO from the script name for .php files (cgi.fix_pathinfo).
    path-info ^(/.+\.php)(/.*)?$
