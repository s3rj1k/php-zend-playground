# HAProxy front-end for the WAF test/bench stack.
#
# WHY HAProxy (replacing the custom Go bridge): the Go bridge existed because a
# real web server's strict HTTP parsing masked WAF behavior. HAProxy is the most
# lenient standard server: accept-unsafe-violations-in-http-request lets invalid
# header chars through (don't 400 — forward them so the WAF is the verifier),
# h1-accept-payload-with-any-method allows GET-with-body, and critically HAProxy
# forwards BOTH Content-Length and Transfer-Encoding to the backend (a known
# property exploited by CVE-2021-40346) so rule 1105 (CL+TE smuggling) is
# testable. HAProxy also gives backend FastCGI connection reuse for free (the
# per-request dial that limited the Go bridge is gone).
#
# THE ONE THING HAProxy CANNOT DO (no HTTP server can): forward a raw CR/LF
# byte inside a header value. RFC 9112 defines CRLF as the header delimiter;
# HAProxy normalizes mid-header line breaks to LWS (manual §1.3.2) before
# forwarding, so the raw byte never reaches the WAF. Rules 1028 (CR in Host)
# and 1047 (CRLF in ARGS) are covered via their percent-encoded alternates
# (%0d/%0a), which the WAF regex matches literally and which FTW sends verbatim.
# Rule 1116 (raw CR/LF in any header) was removed as it defends against an
# impossible condition behind any real server.
#
# FRONT-CONTROLLER ROUTING (the subtle part):
#
# The WAF extension inspects the request inside waf_execute_ex, which fires
# during php_execute_script — i.e. AFTER FPM has opened SCRIPT_FILENAME
# (php_fopen_primary_script in fpm_main.c). If SCRIPT_FILENAME does not resolve
# to a real file, FPM returns "Primary script unknown" and NEVER calls
# execute_ex, so the WAF never runs. Therefore path-based rules (/admin, /.env,
# /wp-config.php, /admin/login.php, ...) — which target paths that are NOT real
# files — would never be inspected unless those requests are routed to a real
# script so execute_ex fires.
#
# At the same time, REQUEST_URI MUST stay the attacker's original URL: the WAF's
# path rules (4, 1003, 187, 241, 510, 516, ...) all match on REQUEST_URI, and the
# real endpoint scripts (leak.php, api.php, response.php, ...) must execute as
# themselves because response-body inspection tests depend on their output.
#
# HAProxy derives REQUEST_URI and SCRIPT_NAME from the SAME source — the request
# line (mux_fcgi.c: params.uri = h1_get_uri(sl); SCRIPT_NAME is parsed from it).
# So set-path/set-uri CANNOT be used: they rewrite the request line and would
# turn REQUEST_URI into /index.php, defeating every path rule. (An earlier
# revision of this config used set-path and was wrong for exactly this reason.)
#
# The ONLY decoupling HAProxy 3.4 offers is the :fcgi-<param> pseudo-header: the
# FastCGI mux reads HTX request headers whose name starts with ":fcgi-" and
# treats them as explicit FastCGI parameter values (there is no set-fcgi-param
# action). Setting ":fcgi-script_name" overrides SCRIPT_NAME (and thus
# SCRIPT_FILENAME = docroot + script_name = /var/www/html/index.php) WITHOUT
# touching REQUEST_URI, which the mux still derives from the untouched request
# line. So:
#   * real endpoint .php (api/echo/leak/...) -> no override -> runs as itself
#   * everything else (/admin, /.env, /wp-config.php, ...) -> SCRIPT_NAME set to
#     /index.php -> FPM opens index.php -> execute_ex fires -> WAF inspects the
#     ORIGINAL REQUEST_URI and blocks. (Benign non-.php paths would execute
#     index.php and return 200, but the suite asserts only the WAF decision for
#     non-.php paths, all of which are malicious — expecting 403 or 404.)
#
# Note: :fcgi-script_filename is NOT usable for this — the mux rebuilds
# SCRIPT_FILENAME as docroot+script_name and ignores any supplied value, so
# SCRIPT_NAME is the knob that controls SCRIPT_FILENAME.

global
    log stdout format raw local0
    maxconn 4096
    # Allow GET/HEAD/DELETE to carry a body (rule 1106 expects GET-with-body
    # to reach the WAF). This is a GLOBAL option (not a frontend option).
    h1-accept-payload-with-any-method

defaults
    log     global
    mode    http
    option  httplog
    option  dontlognull
    timeout connect 5s
    timeout client  60s
    timeout server  60s

frontend http-in
    bind :80
    # Lenient parsing so the WAF (php-fpm) is the verifier, not HAProxy's
    # parser. accept-unsafe-violations-in-http-request: don't 400 on forbidden
    # header chars (forward them). (Renamed from the deprecated
    # accept-invalid-http-request in HAProxy 3.x.)
    option accept-unsafe-violations-in-http-request
    default_backend php-fpm

backend php-fpm
    use-fcgi-app php-fpm
    # php-fpm honours FCGI_KEEP_CONN; HAProxy reuses this connection across
    # requests (the free backend keepalive the Go bridge lacked). The server
    # line is checked so a dead FPM is detected, not 502'd blindly.
    server fpm1 php-fpm:9000 proto fcgi check

    # Real endpoint PHP scripts that must execute as themselves: their output
    # drives response-body inspection tests (leak.php emits stack traces / SQL
    # errors, api.php emits secrets/PANs, big.php crosses the response-body
    # limit, status.php sets status codes, etc.). Enumerated because HAProxy
    # cannot stat the filesystem, so it cannot otherwise tell /echo.php (real)
    # from /wp-config.php or /admin/login.php (not real, must route to
    # index.php so the WAF runs). Match is on the URL-decoded path without the
    # query string.
    acl is_real_endpoint path -m reg ^/(api|big|echo|headers|index|leak|post|response|status)\.php$

    # Route every NON-endpoint path to index.php by overriding SCRIPT_NAME only.
    # This makes FPM open a real script (index.php) so waf_execute_ex fires; the
    # WAF then inspects REQUEST_URI — which stays the original attacker URL
    # because this header does not touch the request line (see file header).
    # /index.php%00 and /index.php.bak do not match the endpoint regex (the
    # decoded path has a trailing NUL / .bak) so they too route to index.php and
    # are blocked by rules 510 (%00) / 516 (.bak) on the original REQUEST_URI.
    http-request set-header :fcgi-script_name /index.php unless is_real_endpoint

fcgi-app php-fpm
    log-stderr global
    docroot /var/www/html
    index   index.php
    # Split PATH_INFO from the script name for .php files (cgi.fix_pathinfo).
    path-info ^(/.+\.php)(/.*)?$
