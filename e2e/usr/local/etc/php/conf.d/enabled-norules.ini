; Enabled, no rules ModSecurity engine initialized and the execute_ex /
; ub_write hooks run every request, but the rules set is empty so no rule
; matches. Measures the per request overhead of the hooking + transaction
; lifecycle + body buffering alone.
[waf]
waf.enabled = 1
waf.modsec_rules_file = /etc/modsecurity/rules.conf
waf.modsec_response_body_limit = 1048576
