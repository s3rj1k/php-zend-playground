; Enabled with the project's test rule set (~99 rules) the same rules used
; by the e2e FTW suite. A realistic "medium" rule load exercising phase 1/2/4
; matching on every request.
[waf]
waf.enabled = 1
waf.modsec_rules_file = /etc/modsecurity/rules.conf
waf.modsec_block_status = 403
waf.modsec_response_body_limit = 1048576

; Audit logging (RelevantOnly) only blocked/matched transactions are written,
; so benign benchmark traffic incurs no I/O cost. Keeps the pre flight block
; (and any false positive) diagnosable via the matched rule list (part K).
waf.modsec_audit_log = /var/log/modsec_audit.log
waf.modsec_audit_log_parts = "ABCFHKZ"
