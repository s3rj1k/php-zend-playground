; Enabled with the OWASP Core Rule Set (CRS) the industry standard "heavy"
; production ruleset (~700+ rules with complex regexes). CRS is bind mounted
; at /etc/modsecurity/crs/ and loaded via a small loader config that includes
; the crs setup and the rules package.
[waf]
waf.enabled = 1
waf.modsec_rules_file = /etc/modsecurity/crs-load.conf
waf.modsec_response_body_limit = 1048576
