---
# Test Oversized requests and limit enforcement
meta:
  author: "PHP WAF Team"
  description: "Oversize/limit tests"
  enabled: true
  name: "039-oversize-limits.yaml"

tests:
  - test_id: 1
    test_title: "Block oversized Cookie header (>4KB)"
    desc: "Cookie >4096 chars triggers rule 1076"
    stages:
      - stage:
          input:
            dest_addr: "nginx"
            port: 80
            method: "GET"
            uri: "/index.php"
            headers:
              User-Agent: "FTW Test Client"
              Host: "localhost"
              Cookie: ""
          output:
            status: 403

  - test_id: 2
    test_title: "Block oversized query string (>2000 chars)"
    desc: "QUERY_STRING >2000 triggers rule 1077"
    stages:
      - stage:
          input:
            dest_addr: "nginx"
            port: 80
            method: "GET"
            uri: "/index.php?"
            headers:
              User-Agent: "FTW Test Client"
              Host: "localhost"
          output:
            status: 403

  - test_id: 3
    test_title: "Allow reasonably-sized Cookie header"
    desc: "Short cookie passes rule 1076"
    stages:
      - stage:
          input:
            dest_addr: "nginx"
            port: 80
            method: "GET"
            uri: "/index.php"
            headers:
              User-Agent: "FTW Test Client"
              Host: "localhost"
              Cookie: "session=abc123"
          output:
            status: 200

  - test_id: 4
    test_title: "Allow reasonably-sized query string"
    desc: "Short query passes rule 1077"
    stages:
      - stage:
          input:
            dest_addr: "nginx"
            port: 80
            method: "GET"
            uri: "/index.php?q=short"
            headers:
              User-Agent: "FTW Test Client"
              Host: "localhost"
          output:
            status: 200
