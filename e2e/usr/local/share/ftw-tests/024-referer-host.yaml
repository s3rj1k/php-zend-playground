---
# Test Referer and Host header inspection
meta:
  author: "PHP WAF Team"
  description: "Referer/Host header tests"
  enabled: true
  name: "024-referer-host.yaml"

tests:
  - test_id: 1
    test_title: "Block spam Referer (casino)"
    desc: "casino. in Referer triggers rule 1026"
    stages:
      - stage:
          input:
            dest_addr: "bridge"
            port: 80
            method: "GET"
            uri: "/index.php"
            headers:
              User-Agent: "FTW Test Client"
              Host: "localhost"
              Referer: "https://casino.example.com/"
          output:
            status: 403

  - test_id: 2
    test_title: "Block spam Referer (viagra)"
    desc: "viagra. in Referer triggers rule 1026"
    stages:
      - stage:
          input:
            dest_addr: "bridge"
            port: 80
            method: "GET"
            uri: "/index.php"
            headers:
              User-Agent: "FTW Test Client"
              Host: "localhost"
              Referer: "http://viagra-cheap.biz/"
          output:
            status: 403

  - test_id: 3
    test_title: "Block spam Referer (porn)"
    desc: "porn. in Referer triggers rule 1026"
    stages:
      - stage:
          input:
            dest_addr: "bridge"
            port: 80
            method: "GET"
            uri: "/index.php"
            headers:
              User-Agent: "FTW Test Client"
              Host: "localhost"
              Referer: "http://porn.example.org"
          output:
            status: 403

  - test_id: 4
    test_title: "Block Host header with CRLF"
    desc: "%0d%0a in Host triggers rule 1028"
    stages:
      - stage:
          input:
            dest_addr: "bridge"
            port: 80
            method: "GET"
            uri: "/index.php"
            headers:
              User-Agent: "FTW Test Client"
              Host: "localhost%0d%0aX-Injected: yes"
          output:
            # The bridge forwards the raw Host value to the WAF; rule 1028
            # matches %0d (or \r/\n). The WAF is the verifier.
            status: 403

  - test_id: 5
    test_title: "Block Host header with absolute URL"
    desc: "http:// in Host triggers rule 1028"
    stages:
      - stage:
          input:
            dest_addr: "bridge"
            port: 80
            method: "GET"
            uri: "/index.php"
            headers:
              User-Agent: "FTW Test Client"
              Host: "http://evil.com"
          output:
            # The bridge forwards the raw Host value; rule 1028 matches the
            # https?:// pattern. The WAF is the verifier.
            status: 403

  - test_id: 6
    test_title: "Block malformed Referer (no scheme)"
    desc: "Referer without : triggers rule 1058"
    stages:
      - stage:
          input:
            dest_addr: "bridge"
            port: 80
            method: "GET"
            uri: "/index.php"
            headers:
              User-Agent: "FTW Test Client"
              Host: "localhost"
              Referer: "just-a-string"
          output:
            status: 403

  - test_id: 7
    test_title: "Allow legitimate Referer"
    desc: "Valid https Referer passes"
    stages:
      - stage:
          input:
            dest_addr: "bridge"
            port: 80
            method: "GET"
            uri: "/index.php"
            headers:
              User-Agent: "FTW Test Client"
              Host: "localhost"
              Referer: "https://www.google.com/search?q=test"
          output:
            status: 200

  - test_id: 8
    test_title: "Allow normal Host header"
    desc: "Plain localhost Host passes"
    stages:
      - stage:
          input:
            dest_addr: "bridge"
            port: 80
            method: "GET"
            uri: "/index.php"
            headers:
              User-Agent: "FTW Test Client"
              Host: "localhost"
          output:
            status: 200
