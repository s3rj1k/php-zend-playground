---
# Test Path traversal and sensitive file access
meta:
  author: "PHP WAF Team"
  description: "Path traversal and sensitive file tests"
  enabled: true
  name: "027-path-sensitive.yaml"

tests:
  - test_id: 1
    test_title: "Block encoded backslash path traversal"
    desc: "%5c variant triggers rule 1037"
    stages:
      - stage:
          input:
            dest_addr: "nginx"
            port: 80
            method: "GET"
            uri: "/index.php?file=..%5c..%5cetc%5cpasswd"
            headers:
              User-Agent: "FTW Test Client"
              Host: "localhost"
          output:
            status: 403

  - test_id: 2
    test_title: "Block double-encoded backslash traversal"
    desc: ".%5c variant triggers rule 1037"
    stages:
      - stage:
          input:
            dest_addr: "nginx"
            port: 80
            method: "GET"
            uri: "/index.php?file=.%5c.%5c.%5cetc%5cpasswd"
            headers:
              User-Agent: "FTW Test Client"
              Host: "localhost"
          output:
            status: 403

