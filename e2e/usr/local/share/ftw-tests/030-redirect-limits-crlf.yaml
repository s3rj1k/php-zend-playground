---
# Test Open redirect, excessive args, nested JSON, CRLF
meta:
  author: "PHP WAF Team"
  description: "Redirect/limits/CRLF tests"
  enabled: true
  name: "030-redirect-limits-crlf.yaml"

tests:
  - test_id: 1
    test_title: "Block open redirect via next param"
    desc: "next=https://evil triggers rule 1044"
    stages:
      - stage:
          input:
            dest_addr: "bridge"
            port: 80
            method: "GET"
            uri: "/index.php?next=https://evil.com"
            headers:
              User-Agent: "FTW Test Client"
              Host: "localhost"
          output:
            status: 403

  - test_id: 2
    test_title: "Block open redirect via redirect param"
    desc: "redirect=https://evil triggers rule 1044"
    stages:
      - stage:
          input:
            dest_addr: "bridge"
            port: 80
            method: "GET"
            uri: "/index.php?redirect=https://evil.com/"
            headers:
              User-Agent: "FTW Test Client"
              Host: "localhost"
          output:
            status: 403

  - test_id: 3
    test_title: "Block open redirect via redirect param"
    desc: "redirect=https://evil triggers rule 1044"
    stages:
      - stage:
          input:
            dest_addr: "bridge"
            port: 80
            method: "GET"
            uri: "/index.php?redirect=https://evil.com/x"
            headers:
              User-Agent: "FTW Test Client"
              Host: "localhost"
          output:
            status: 403

  - test_id: 4
    test_title: "Block open redirect via goto param"
    desc: "goto=https://evil triggers rule 1044"
    stages:
      - stage:
          input:
            dest_addr: "bridge"
            port: 80
            method: "GET"
            uri: "/index.php?goto=https://evil.com"
            headers:
              User-Agent: "FTW Test Client"
              Host: "localhost"
          output:
            status: 403

  - test_id: 5
    test_title: "Allow localhost redirect target"
    desc: "next=https://localhost passes rule 1044"
    stages:
      - stage:
          input:
            dest_addr: "bridge"
            port: 80
            method: "GET"
            uri: "/index.php?next=https://localhost/app"
            headers:
              User-Agent: "FTW Test Client"
              Host: "localhost"
          output:
            status: 200

  - test_id: 6
    test_title: "Block excessive number of arguments"
    desc: ">50 args triggers rule 1045"
    stages:
      - stage:
          input:
            dest_addr: "bridge"
            port: 80
            method: "GET"
            uri: "/index.php?a1=1&a2=2&a3=3&a4=4&a5=5&a6=6&a7=7&a8=8&a9=9&a10=10&a11=11&a12=12&a13=13&a14=14&a15=15&a16=16&a17=17&a18=18&a19=19&a20=20&a21=21&a22=22&a23=23&a24=24&a25=25&a26=26&a27=27&a28=28&a29=29&a30=30&a31=31&a32=32&a33=33&a34=34&a35=35&a36=36&a37=37&a38=38&a39=39&a40=40&a41=41&a42=42&a43=43&a44=44&a45=45&a46=46&a47=47&a48=48&a49=49&a50=50&a51=51"
            headers:
              User-Agent: "FTW Test Client"
              Host: "localhost"
          output:
            status: 403

  - test_id: 7
    test_title: "Block excessively nested JSON"
    desc: "10+ nested {} triggers rule 1046"
    stages:
      - stage:
          input:
            dest_addr: "bridge"
            port: 80
            method: "POST"
            uri: "/post.php"
            headers:
              User-Agent: "FTW Test Client"
              Host: "localhost"
              Content-Type: "application/json"
            data: '{"a":{"a":{"a":{"a":{"a":{"a":{"a":{"a":{"a":{"a":{"a":{"a":1}}}}}}}}}}}'
          output:
            status: 403

  - test_id: 8
    test_title: "Block CRLF injection in arg"
    desc: "%0d%0a in arg triggers rule 1047"
    stages:
      - stage:
          input:
            dest_addr: "bridge"
            port: 80
            method: "GET"
            uri: "/index.php?x=value%0d%0aSet-Cookie:%20evil=1"
            headers:
              User-Agent: "FTW Test Client"
              Host: "localhost"
          output:
            status: 403

  - test_id: 9
    test_title: "Block LF injection in arg"
    desc: "%0a in arg triggers rule 1047"
    stages:
      - stage:
          input:
            dest_addr: "bridge"
            port: 80
            method: "GET"
            uri: "/index.php?x=line%0ainjection"
            headers:
              User-Agent: "FTW Test Client"
              Host: "localhost"
          output:
            status: 403

  - test_id: 10
    test_title: "Allow moderate number of arguments"
    desc: "10 args should pass rule 1045"
    stages:
      - stage:
          input:
            dest_addr: "bridge"
            port: 80
            method: "GET"
            uri: "/index.php?a1=1&a2=2&a3=3&a4=4&a5=5&a6=6&a7=7&a8=8&a9=9&a10=10"
            headers:
              User-Agent: "FTW Test Client"
              Host: "localhost"
          output:
            status: 200

  - test_id: 11
    test_title: "Allow normally nested JSON"
    desc: "3 levels of nesting passes rule 1046"
    stages:
      - stage:
          input:
            dest_addr: "bridge"
            port: 80
            method: "POST"
            uri: "/post.php"
            headers:
              User-Agent: "FTW Test Client"
              Host: "localhost"
              Content-Type: "application/json"
            data: '{"a":{"b":{"c":1}}}'
          output:
            status: 200
