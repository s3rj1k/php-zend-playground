---
# Test LDAP and NoSQL injection
meta:
  author: "PHP WAF Team"
  description: "LDAP/NoSQL injection tests"
  enabled: true
  name: "029-ldap-nosql.yaml"

tests:
  - test_id: 1
    test_title: "Block LDAP wildcard injection (*)"
    desc: "*)( triggers rule 1042"
    stages:
      - stage:
          input:
            dest_addr: "nginx"
            port: 80
            method: "GET"
            uri: "/index.php?user=*)(uid=*"
            headers:
              User-Agent: "FTW Test Client"
              Host: "localhost"
          output:
            status: 403

  - test_id: 2
    test_title: "Block LDAP OR branch injection"
    desc: "(|(...) triggers rule 1042"
    stages:
      - stage:
          input:
            dest_addr: "nginx"
            port: 80
            method: "GET"
            uri: "/index.php?user=(|(uid=admin)(uid=*))"
            headers:
              User-Agent: "FTW Test Client"
              Host: "localhost"
          output:
            status: 403

  - test_id: 3
    test_title: "Block LDAP uid=* wildcard"
    desc: "uid=* triggers rule 1042"
    stages:
      - stage:
          input:
            dest_addr: "nginx"
            port: 80
            method: "GET"
            uri: "/index.php?user=uid=*"
            headers:
              User-Agent: "FTW Test Client"
              Host: "localhost"
          output:
            status: 403

  - test_id: 4
    test_title: "Block NoSQL $where"
    desc: "$where triggers rule 1043"
    stages:
      - stage:
          input:
            dest_addr: "nginx"
            port: 80
            method: "GET"
            uri: "/index.php?q=$where:1=1"
            headers:
              User-Agent: "FTW Test Client"
              Host: "localhost"
          output:
            status: 403

  - test_id: 5
    test_title: "Block NoSQL $ne"
    desc: "$ne triggers rule 1043"
    stages:
      - stage:
          input:
            dest_addr: "nginx"
            port: 80
            method: "GET"
            uri: "/index.php?q=$ne:null"
            headers:
              User-Agent: "FTW Test Client"
              Host: "localhost"
          output:
            status: 403

  - test_id: 6
    test_title: "Block NoSQL $gt"
    desc: "$gt triggers rule 1043"
    stages:
      - stage:
          input:
            dest_addr: "nginx"
            port: 80
            method: "GET"
            uri: "/index.php?q=$gt:5"
            headers:
              User-Agent: "FTW Test Client"
              Host: "localhost"
          output:
            status: 403

  - test_id: 7
    test_title: "Block NoSQL $or"
    desc: "$or triggers rule 1043"
    stages:
      - stage:
          input:
            dest_addr: "nginx"
            port: 80
            method: "GET"
            uri: "/index.php?q=$or:[1,2]"
            headers:
              User-Agent: "FTW Test Client"
              Host: "localhost"
          output:
            status: 403

  - test_id: 8
    test_title: "Allow benign query with $"
    desc: "Plain $ not followed by NoSQL operator passes"
    stages:
      - stage:
          input:
            dest_addr: "nginx"
            port: 80
            method: "GET"
            uri: "/index.php?price=9.99"
            headers:
              User-Agent: "FTW Test Client"
              Host: "localhost"
          output:
            status: 200

  - test_id: 9
    test_title: "Allow benign username"
    desc: "Regular username passes"
    stages:
      - stage:
          input:
            dest_addr: "nginx"
            port: 80
            method: "GET"
            uri: "/index.php?user=alice"
            headers:
              User-Agent: "FTW Test Client"
              Host: "localhost"
          output:
            status: 200
