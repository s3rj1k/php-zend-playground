[waf]
; Enable the WAF extension
waf.enabled = 0

; ============================================
; ModSecurity Integration Settings
; ============================================

; Path to ModSecurity rules file (e.g., /etc/modsecurity/rules.conf)
; Can also use include directives to load multiple rule files
waf.modsec_rules_file = ""

; Inline ModSecurity rules (alternative to rules_file)
; Example SecRuleEngine DetectionOnly
waf.modsec_rules_inline = ""

; HTTP status code to return when request is blocked (default 403 Forbidden)
waf.modsec_block_status = 403

; ============================================
; Debug Logging
; ============================================

; Path to ModSecurity debug log file (empty = no debug logging)
waf.modsec_debug_log = ""

; Debug log level (0 9, higher = more verbose)
; 0 No debug logging
; 1 3 Errors and warnings
; 4 5 Informational messages
; 6 9 Detailed debugging (performance impact)
waf.modsec_debug_level = 0

; ============================================
; Transaction Settings
; ============================================

; Custom transaction ID (empty = auto generated)
; The transaction ID is included in error responses and logs
waf.modsec_transaction_id = ""

; ============================================
; Audit Logging
; ============================================

; Path to ModSecurity audit log file or directory
; Empty = no audit logging
waf.modsec_audit_log = ""

; Audit log parts to include (default ABCFHZ)
; A Audit log header (mandatory)
; B Request headers
; C Request body
; F Response headers
; H Audit log trailer
; Z Final boundary (mandatory)
; I Request body (multipart replacement for C)
; J Uploaded files info
; K Matched rules list
waf.modsec_audit_log_parts = "ABCFHZ"

; ============================================
; Response Processing
; ============================================

; Maximum response body size to buffer for inspection (bytes)
; Default 10MB (10485760 bytes)
; Set to 0 to disable response body inspection entirely (nothing is buffered;
; RESPONSE_BODY rules will not fire, response headers phase still runs)
waf.modsec_response_body_limit = 10485760
